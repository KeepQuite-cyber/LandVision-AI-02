<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandVision AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrapper">
    <aside class="sidebar">
        <div class="logo mb-4">
            <h3 class="mb-1"> 🌍 LandVision AI </h3>
            <small class="text-muted"> Smart Land Mapping </small>
        </div>
        <div class="filter-section">
            <label class="form-label">State</label>
            <select id="stateSelect" class="form-select">
                <option value=""> Select State </option>
            </select>
        </div>
        <div class="filter-section mt-3">
            <label class="form-label">District</label>
            <select id="districtSelect" class="form-select">
                <option value="">Select District</option>
            </select>
        </div>
        <div class="filter-section mt-3">
            <label class="form-label">Tehsil</label>
            <select id="tehsilSelect" class="form-select">
                <option value=""> Select Tehsil</option>
            </select>
        </div>
        <div class="filter-section mt-3">
            <label class="form-label">Village</label>
            <select id="villageSelect"  class="form-select">
                <option value=""> Select Village</option>
            </select>
        </div>
        <hr>
        <h5 class="mb-3"> 🔍 Search Plot </h5>
        <div class="input-group mb-3">
            <input id="plotSearch" class="form-control" placeholder="Enter Plot Number">
            <button id="searchBtn" class="btn btn-success"> Search</button>
        </div>
        <hr>
        <div id="plotInfo">
            <h5> 📍 Plot Details</h5>
            <p class="text-muted"> No plot selected.</p>
        </div>
        <hr>
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white"> 🤖 LandVision AI Assistant</div>
            <div class="card-body">
                <div id="chatMessages"  class="border rounded p-2 bg-light mb-3"  style="height:180px; overflow-y:auto;">
                    <div class="text-muted">👋 Hello!<br>
                        Ask me anything about your land.
                    </div>
                </div>
                <div class="input-group">
                    <input id="chatInput" class="form-control" placeholder="Ask AI..." >
                    <button id="sendMessage" class="btn btn-success">Send </button>
                </div>
            </div>
        </div>
    </aside>
    <main class="map-container"><div id="map"></div></main>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>


    
</script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/map.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/search.js"></script>
<script src="js/ai.js"></script>
<script src="js/app.js"></script>
</body>
</html>
